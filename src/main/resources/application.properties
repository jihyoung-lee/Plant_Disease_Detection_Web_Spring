spring.application.name=Plant_Disease_Detection_Web_Spring

pest.api.key=${PEST_API_KEY}
pest.api.url=http://ncpms.rda.go.kr/npmsAPI/service

ai.api.url=http://localhost:5000

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/plant_disease?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=utf8}
spring.datasource.username=${MYSQL_USERNAME:plant_app}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
